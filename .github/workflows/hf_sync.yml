name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main] # Triggers the workflow every time you push code to your main branch

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true # Ensures machine learning .pkl blobs pass through smoothly

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://majnu:$HF_TOKEN@huggingface.co/spaces/majnu/nifty-predictor main
